<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Settings</title>
    <link rel="stylesheet" href="index.css"/>
</head>
<body>
<div class="container">
    <div class="hero" style="padding:40px 0 20px;">
        <div class="logo-area">
            <h1 class="logo-title">⚙️ Settings</h1>
        </div>
    </div>
    <div style="max-width:500px;margin:0 auto;">
        <div class="section-label">Change Password</div>
        <div style="background:#141420;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px;margin-top:12px;">
            <input type="password" id="old-pass" placeholder="Current password" style="width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:10px 14px;font-size:14px;outline:none;margin-bottom:12px;font-family:inherit;"/>
            <input type="password" id="new-pass" placeholder="New password" style="width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:10px 14px;font-size:14px;outline:none;margin-bottom:12px;font-family:inherit;"/>
            <input type="password" id="confirm-pass" placeholder="Confirm new password" style="width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:10px 14px;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;"/>
            <button onclick="changePass()" style="width:100%;background:#7864ff;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Save Password</button>
            <p id="msg" style="margin-top:12px;font-size:13px;"></p>
        </div>

        <div class="section-label" style="margin-top:24px;">Quick Actions</div>
        <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
            <a href="/" style="background:#141420;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 18px;color:#ccc;text-decoration:none;font-size:13px;">🏠 Home</a>
            <a href="/login" style="background:#141420;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 18px;color:#ccc;text-decoration:none;font-size:13px;">🔒 Logout</a>
        </div>
    </div>
</div>
<script>
async function changePass() {
    const old = document.getElementById('old-pass').value;
    const nw = document.getElementById('new-pass').value;
    const conf = document.getElementById('confirm-pass').value;
    const msg = document.getElementById('msg');
    if (!old || !nw || !conf) { msg.style.color='#ff6666'; msg.textContent='Fill in all fields.'; return; }
    if (nw !== conf) { msg.style.color='#ff6666'; msg.textContent='Passwords do not match.'; return; }
    const res = await fetch('/settings/password', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ old, new: nw })
    });
    const data = await res.json();
    if (data.ok) { msg.style.color='#00e5a0'; msg.textContent='Password changed successfully!'; }
    else { msg.style.color='#ff6666'; msg.textContent=data.error; }
}
</script>
</body>
</html>
